name: Deploy with oidc


on:
    push:
        branches:
        - main

jobs:

    deploy:
     runs-on: ubuntu-latest

     permissions:
       id-token: write
       contents: read

     steps:

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         role-to-assume: arn:aws:iam::990227773016:role/githubRole
         aws-region: us-east-1

      - name: Test identity
        run: aws sts get-caller-identity
      - name: Test ECR
        run: aws ecr describe-repositories
      - name: Test EKS
        run: aws eks describe-cluster --name YOUR_CLUSTER --region us-east-1